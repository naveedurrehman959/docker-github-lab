version: '3.8'

services:
  python-app:
    build: .
    image: myimage:v2
    container_name: my-python-app-v2
    ports:
      - "8080:8080"
    environment:
      - APP_NAME=Enhanced Docker Python App
      - APP_VERSION=2.1.0
      - ENVIRONMENT=staging
      - DEBUG=true
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
