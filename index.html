<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: white;
            padding: 20px;
        }

        .container {
            margin: 50px auto;
            width: 80%;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }

        footer {
            margin-top: 50px;
            background-color: #333;
            color: white;
            padding: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <div class="container">
        <h2>Hello, World!</h2>
        <p>This is a sample HTML page for testing deployments.</p>

        <button onclick="showMessage()">Click Me</button>

        <p id="message"></p>
    </div>

    <footer>
        <p>&copy; 2026 Naveed ur Rehman</p>
    </footer>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML =
                "Congratulations! Your website is working.";
        }
    </script>

</body>
</html>
